name: Lint

on:
  push:
    branches: [main, master]
    paths:
      - '**.sh'
  pull_request:
    paths:
      - '**.sh'

jobs:
  shellcheck:
    runs-on: local
    steps:
      - uses: actions/checkout@v4
      - name: Install Shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run Shellcheck
        run: shellcheck -s sh kewt.sh markdown.sh tools/build-standalone.sh || true
