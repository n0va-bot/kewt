name: Lint

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  shellcheck:
    runs-on: local
    steps:
      - uses: actions/checkout@v4
      - name: Install Shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run Shellcheck
        run: shellcheck kewt.sh markdown.sh tools/build-standalone.sh || true
